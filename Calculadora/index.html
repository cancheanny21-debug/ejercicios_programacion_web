<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compaatible" content="IE-edge">
    <title>Calculadora</title>
    <meta name="viewport" content="width=device-widtm,initial" -scale=1'>
    <link rel="stylesheet" type="text/css" media="screen" href="style.css">

</head>

<body>
    <div class="calculadora">
        <input type="text" id="pantalla" readonly>

        <div class="botones">
            <button class="limpiar" onclick="limpiar()">AC</button>
            <button class="borrar" onclick="borrar()">DEL</button>
            <button class="operador" onclick="insertar('%')">%</button>
            <button class="operador" onclick="insertar('/')">/</button>
            <button class="numero" onclick="insertar('7')">7</button>
            <button class="numero" onclick="insertar('8')">8</button>
            <button class="numero" onclick="insertar('9')">9</button>
            <button class="operador" onclick="insertar('*')">*</button>
            <button class="numero" onclick="insertar('4')">4</button>
            <button class="numero" onclick="insertar('5')">5</button>
            <button class="numero" onclick="insertar('6')">6</button>
            <button class="operador" onclick="insertar('-')">-</button>
            <button class="numero" onclick="insertar('1')">1</button>
            <button class="numero" onclick="insertar('2')">2</button>
            <button class="numero" onclick="insertar('3')">3</button>
            <button class="operador" onclick="insertar('+')">+</button>
            <button class="numero" onclick="insertar(0)">0</button>
            <button class="numero" onclick="insertar('.')">.</button>
            <button class="operador" onclick="calcular()">=</button>
        </div>
    </div>
</body>
<script src="main.js"></script>

</html>
