<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>CRUD</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>CRUD de Estudiantes</h2>

            <tr>

                <th>Nombre</th>
                <th>Edad</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tabla">

        </tbody>

    </table>

    <script src="main.js"></script>

</body>

</html>
