<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta Presentacion</title>
    <style>
        :root {
            --bg-page: #f1f5f9;
            --bg-card: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #4facfe;
            --text-main: #334155;
            --text-muted: #64748b;
        }


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: rgb(198, 243, 219);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }


        .Tarjeta {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 380px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            padding-bottom: 10px;

        }

        .Tarjeta:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
        }


        .foto-perfil {
            width: 150px;
            height: 150px;
            margin: 30px auto 10px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #000000;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
        }


        .foto-perfil img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 10%;
        }

        .info-perfil {
            padding: 15px 25px;
            text-align: center;
        }

        .info-perfil h1 {
            font-size: 1.45rem;
            color: var(--primary-color);
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .info-perfil .profesion {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .contacto-perfil {
            padding: 10px 25px 25px 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }


        .contacto-perfil p {
            display: flex;
            flex-direction: column;
            font-size: 0.85rem;
            color: var(--text-muted);
            background-color: #f8fafc;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .contacto-perfil strong {
            color: var(--primary-color);
            margin-bottom: 3px;
            font-weight: 600;
        }


        .contacto-perfil a {
            font-size: 0.95rem;
            color: var(--text-main);
            text-decoration: none;
            word-break: break-all;
            transition: color 0.2s ease;
        }

        .contacto-perfil a:hover {
            color: var(--accent-color);
        }

        @media (max-width: 360px) {
            .Tarjeta {
                max-width: 100%;
            }

            .foto-perfil {
                width: 130px;
                height: 130px;
            }

            .info-perfil h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>
    <div class="Tarjeta">

        <div class="foto-perfil">

            <img src="perfil.jpg" alt="Fotografía de Anny Canche">
        </div>

        <div class="info-perfil">

            <h1>Anny Liseth Canche Montaño</h1>
            <p class="profesion">Desarrollo de Software</p>
        </div>

        <div class="contacto-perfil">
            <p>
                <strong>Correo:</strong>
                <span><a href="mailto:cancheanny21@gmail.com">cancheanny21@gmail.com</a></span>
            </p>
            <p>
                <strong>Teléfono:</strong>
                <span><a href="tel:+593992265111">0992265111</a></span>
            </p>
        </div>

    </div>
</body>

</html>
