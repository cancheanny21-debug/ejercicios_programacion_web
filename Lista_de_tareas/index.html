<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://font.googleeapis.com/css2?family=width@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">

                <div class="card todo-card shadow border-0 rounded-4">
                    <div class="card-header bg-white border-0 pt-4 pb-0">
                        <h2 class="fw-bold text-primary mb-3">
                            <i class="fa-solid fa-square-check me-2"></i>Mis Tareas
                        </h2>

                        <form id="todo-form" class="mb-4">
                            <div class="input-group input-group-lg shadow-sm rounded-3 overflow-hidden">
                                <input type="text" id="task-input" class="form-control border-0 bg-light"
                                    placeholder="Añadir una nueva tarea..." required autocomplete="off">
                                <button class="btn btn-primary px-4" type="submit">
                                    <i class="fa-solid fa-plus"></i>
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="card-body px-4 py-0">
                        <ul id="task-list" class="list-group list-group-flush mb-3">
                        </ul>
                    </div>

                    <div class="card-footer bg-white border-0 pb-4 text-center">
                        <span id="task-counter" class="text-muted small fw-medium">0 tareas pendientes</span>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
